name: Build and Release v1.0.0

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Source Code
        uses: actions/checkout@v4
        with:
          repository: babycodes/KAYPOSFNB
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > frontend/android/app/upload-keystore.jks
        shell: bash

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > frontend/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> frontend/android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> frontend/android/key.properties
          echo "storeFile=upload-keystore.jks" >> frontend/android/key.properties
        shell: bash

      - name: Install Dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build APK Release
        working-directory: frontend
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: frontend/build/app/outputs/flutter-apk/app-release.apk

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Source Code
        uses: actions/checkout@v4
        with:
          repository: babycodes/KAYPOSFNB
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Linux Build Dependencies & FPM
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev ruby ruby-dev rubygems
          sudo gem install fpm

      - name: Install Dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build Linux Release
        working-directory: frontend
        run: flutter build linux --release

      - name: Package Linux (DEB, RPM, TAR.GZ)
        working-directory: frontend
        run: |
          cd build/linux/x64/release/bundle
          
          # 1. Package TAR.GZ
          tar -czvf ../../../../../KAYPOSFNB-linux-x64.tar.gz *
          
          # 2. Package DEB
          fpm -s dir -t deb -n kayposfnb -v 1.0.0 --prefix /opt/kayposfnb -C . .
          mv kayposfnb_1.0.0_amd64.deb ../../../../../
          
          # 3. Package RPM
          fpm -s dir -t rpm -n kayposfnb -v 1.0.0 --prefix /opt/kayposfnb -C . .
          mv kayposfnb-1.0.0-1.x86_64.rpm ../../../../../

      - name: Upload Linux Builds
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            KAYPOSFNB-linux-x64.tar.gz
            kayposfnb_1.0.0_amd64.deb
            kayposfnb-1.0.0-1.x86_64.rpm

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Private Source Code
        uses: actions/checkout@v4
        with:
          repository: babycodes/KAYPOSFNB
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build Windows Release
        working-directory: frontend
        run: flutter build windows --release

      - name: Package Windows
        working-directory: frontend
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath ..\KAYPOSFNB-windows-x64.zip

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: KAYPOSFNB-windows-x64.zip

  publish-release:
    needs: [build-android, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/android-build/app-release.apk
            artifacts/linux-builds/KAYPOSFNB-linux-x64.tar.gz
            artifacts/linux-builds/kayposfnb_1.0.0_amd64.deb
            artifacts/linux-builds/kayposfnb-1.0.0-1.x86_64.rpm
            artifacts/windows-builds/KAYPOSFNB-windows-x64.zip
          tag_name: v1.0.0
          name: Release v1.0.0
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
