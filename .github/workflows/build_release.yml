name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Source Code
        uses: actions/checkout@v4
        with:
          repository: babycodes/KAYPOSFNB
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > frontend/android/app/upload-keystore.jks
        shell: bash

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > frontend/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> frontend/android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> frontend/android/key.properties
          echo "storeFile=upload-keystore.jks" >> frontend/android/key.properties
        shell: bash

      - name: Install Dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build APK Release
        working-directory: frontend
        run: |
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk kayposfnb-v1.0.${{ github.run_number }}.apk

      - name: Release APK
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/kayposfnb-v1.0.${{ github.run_number }}.apk
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Source Code
        uses: actions/checkout@v4
        with:
          repository: babycodes/KAYPOSFNB
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Linux Build Dependencies & FPM
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev ruby ruby-dev rubygems
          sudo gem install fpm

      - name: Install Dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build Linux Release
        working-directory: frontend
        run: flutter build linux --release

      - name: Package Linux (DEB, RPM)
        working-directory: frontend
        run: |
          cd build/linux/x64/release/bundle
          
          mkdir -p pkg_root/opt/kayposfnb
          # Copy flutter build artifacts into opt
          find . -mindepth 1 -maxdepth 1 ! -name 'pkg_root' -exec cp -r {} pkg_root/opt/kayposfnb/ \;
          
          # Create Desktop Shortcut
          mkdir -p pkg_root/usr/share/applications
          echo "[Desktop Entry]" > pkg_root/usr/share/applications/kayposfnb.desktop
          echo "Version=1.0" >> pkg_root/usr/share/applications/kayposfnb.desktop
          echo "Name=KayPOS FNB" >> pkg_root/usr/share/applications/kayposfnb.desktop
          echo "Comment=Food & Beverage POS System" >> pkg_root/usr/share/applications/kayposfnb.desktop
          echo "Exec=/opt/kayposfnb/kayposfnb" >> pkg_root/usr/share/applications/kayposfnb.desktop
          echo "Icon=kayposfnb" >> pkg_root/usr/share/applications/kayposfnb.desktop
          echo "Terminal=false" >> pkg_root/usr/share/applications/kayposfnb.desktop
          echo "Type=Application" >> pkg_root/usr/share/applications/kayposfnb.desktop
          echo "Categories=Utility;Office;" >> pkg_root/usr/share/applications/kayposfnb.desktop
          
          # Copy App Icon for Desktop Shortcut (using icon-512.png)
          mkdir -p pkg_root/usr/share/pixmaps
          cp ../../../../../assets/icon-512.png pkg_root/usr/share/pixmaps/kayposfnb.png
          
          # Create symbolic link for terminal launch
          mkdir -p pkg_root/usr/bin
          ln -s /opt/kayposfnb/kayposfnb pkg_root/usr/bin/kayposfnb
          
          # Build DEB
          fpm -s dir -t deb -n kayposfnb -v 1.0.${{ github.run_number }} -p ../../../../../kayposfnb-v1.0.${{ github.run_number }}.deb -C pkg_root usr opt
          
          # Build RPM
          fpm -s dir -t rpm -n kayposfnb -v 1.0.${{ github.run_number }} -p ../../../../../kayposfnb-v1.0.${{ github.run_number }}.rpm -C pkg_root usr opt

      - name: Release Linux Builds
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/kayposfnb-v1.0.${{ github.run_number }}.deb
            frontend/kayposfnb-v1.0.${{ github.run_number }}.rpm
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Private Source Code
        uses: actions/checkout@v4
        with:
          repository: babycodes/KAYPOSFNB
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build Windows Release
        working-directory: frontend
        run: flutter build windows --release

      - name: Package Windows (EXE via Inno Setup)
        working-directory: frontend
        run: |
          $SetupScript = @"
          [Setup]
          AppName=KAYPOSFNB
          AppVersion=1.0.${{ github.run_number }}
          DefaultDirName={autopf}\KAYPOSFNB
          OutputDir=.
          OutputBaseFilename=kayposfnb-v1.0.${{ github.run_number }}
          Compression=lzma
          SolidCompression=yes
          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          [Icons]
          Name: "{autoprograms}\KAYPOSFNB"; Filename: "{app}\kayposfnb.exe"
          Name: "{autodesktop}\KAYPOSFNB"; Filename: "{app}\kayposfnb.exe"
          "@
          Set-Content -Path installer.iss -Value $SetupScript
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" installer.iss

      - name: Release Windows Build
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/kayposfnb-v1.0.${{ github.run_number }}.exe
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
