name: Build and Release v1.0.0

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Source Code
        uses: actions/checkout@v4
        with:
          repository: babycodes/KAYPOSFNB
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > frontend/android/app/upload-keystore.jks
        shell: bash

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > frontend/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> frontend/android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> frontend/android/key.properties
          echo "storeFile=upload-keystore.jks" >> frontend/android/key.properties
        shell: bash

      - name: Install Dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build APK Release
        working-directory: frontend
        run: flutter build apk --release

      - name: Release APK
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/build/app/outputs/flutter-apk/app-release.apk
          tag_name: v1.0.0
          name: Release v1.0.0
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Source Code
        uses: actions/checkout@v4
        with:
          repository: babycodes/KAYPOSFNB
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Linux Build Dependencies & FPM
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev ruby ruby-dev rubygems
          sudo gem install fpm

      - name: Install Dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build Linux Release
        working-directory: frontend
        run: flutter build linux --release

      - name: Package Linux (DEB, RPM)
        working-directory: frontend
        run: |
          cd build/linux/x64/release/bundle
          
          # 1. Package DEB
          fpm -s dir -t deb -n kayposfnb -v 1.0.0 --prefix /opt/kayposfnb -p kayposfnb_1.0.0_amd64.deb -C . .
          
          # 2. Package RPM
          fpm -s dir -t rpm -n kayposfnb -v 1.0.0 --prefix /opt/kayposfnb -p kayposfnb-1.0.0-1.x86_64.rpm -C . .

      - name: Release Linux Builds
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/build/linux/x64/release/bundle/kayposfnb_1.0.0_amd64.deb
            frontend/build/linux/x64/release/bundle/kayposfnb-1.0.0-1.x86_64.rpm
          tag_name: v1.0.0
          name: Release v1.0.0
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Private Source Code
        uses: actions/checkout@v4
        with:
          repository: babycodes/KAYPOSFNB
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build Windows Release
        working-directory: frontend
        run: flutter build windows --release

      - name: Package Windows (EXE via Inno Setup)
        working-directory: frontend
        run: |
          $SetupScript = @"
          [Setup]
          AppName=KAYPOSFNB
          AppVersion=1.0.0
          DefaultDirName={autopf}\KAYPOSFNB
          OutputDir=.
          OutputBaseFilename=KAYPOSFNB-windows-x64
          Compression=lzma
          SolidCompression=yes
          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          [Icons]
          Name: "{autoprograms}\KAYPOSFNB"; Filename: "{app}\frontend.exe"
          Name: "{autodesktop}\KAYPOSFNB"; Filename: "{app}\frontend.exe"
          "@
          Set-Content -Path installer.iss -Value $SetupScript
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" installer.iss

      - name: Release Windows Build
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/KAYPOSFNB-windows-x64.exe
          tag_name: v1.0.0
          name: Release v1.0.0
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
