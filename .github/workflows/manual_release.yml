name: Build & Release Multiplatform

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release version tag (e.g. v1.0.23)'
        required: true
        default: 'v1.0.23'
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: 'New release build'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: babycodes/KAYPOSFNB
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > frontend/android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > frontend/android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build APK
        working-directory: frontend
        run: flutter build apk --release

      - name: Rename APK
        run: |
          VERSION="${{ github.event.inputs.version_tag || github.ref_name }}"
          mv frontend/build/app/outputs/flutter-apk/app-release.apk \
             frontend/build/app/outputs/flutter-apk/KAYPOSFNB-$VERSION.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2.0.1
        with:
          tag_name: ${{ github.event.inputs.version_tag || github.ref_name }}
          name: KAYPOS FNB ${{ github.event.inputs.version_tag || github.ref_name }}
          body: ${{ github.event.inputs.release_notes }}
          files: frontend/build/app/outputs/flutter-apk/KAYPOSFNB-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux DEB & RPM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: babycodes/KAYPOSFNB
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev ruby ruby-dev rubygems
          sudo gem install fpm

      - name: Install Dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build Linux Release
        working-directory: frontend
        run: flutter build linux --release

      - name: Package Linux (DEB, RPM)
        working-directory: frontend
        run: |
          VERSION="${{ github.event.inputs.version_tag || github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          
          cd build/linux/x64/release/bundle
          
          mkdir -p pkg_root/opt/kayposfnb
          find . -mindepth 1 -maxdepth 1 ! -name 'pkg_root' -exec cp -r {} pkg_root/opt/kayposfnb/ \;
          
          mkdir -p pkg_root/usr/share/applications
          echo "[Desktop Entry]" > pkg_root/usr/share/applications/kayposfnb.desktop
          echo "Version=1.0" >> pkg_root/usr/share/applications/kayposfnb.desktop
          echo "Name=KayPOS FNB" >> pkg_root/usr/share/applications/kayposfnb.desktop
          echo "Comment=Food & Beverage POS System" >> pkg_root/usr/share/applications/kayposfnb.desktop
          echo "Exec=/opt/kayposfnb/kayposfnb" >> pkg_root/usr/share/applications/kayposfnb.desktop
          echo "Icon=kayposfnb" >> pkg_root/usr/share/applications/kayposfnb.desktop
          echo "Terminal=false" >> pkg_root/usr/share/applications/kayposfnb.desktop
          echo "Type=Application" >> pkg_root/usr/share/applications/kayposfnb.desktop
          echo "Categories=Utility;Office;" >> pkg_root/usr/share/applications/kayposfnb.desktop
          
          mkdir -p pkg_root/usr/share/pixmaps
          cp ../../../../../assets/icon-512.png pkg_root/usr/share/pixmaps/kayposfnb.png
          
          mkdir -p pkg_root/usr/bin
          ln -s /opt/kayposfnb/kayposfnb pkg_root/usr/bin/kayposfnb
          
          fpm -s dir -t deb -n kayposfnb -v $VERSION_NUM -p ../../../../../KAYPOSFNB-$VERSION.deb -C pkg_root usr opt
          fpm -s dir -t rpm -n kayposfnb -v $VERSION_NUM -p ../../../../../KAYPOSFNB-$VERSION.rpm -C pkg_root usr opt

      - name: Release Linux Builds
        uses: softprops/action-gh-release@v2.0.1
        with:
          files: |
            frontend/KAYPOSFNB-*.deb
            frontend/KAYPOSFNB-*.rpm
          tag_name: ${{ github.event.inputs.version_tag || github.ref_name }}
          name: KAYPOS FNB ${{ github.event.inputs.version_tag || github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: babycodes/KAYPOSFNB
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build Windows Release
        working-directory: frontend
        run: flutter build windows --release

      - name: Package Windows (EXE via Inno Setup)
        working-directory: frontend
        run: |
          $VERSION = "${{ github.event.inputs.version_tag || github.ref_name }}"
          $VERSION_NUM = $VERSION.TrimStart('v')
          
          # Download VC++ Redistributable for bundling
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "vc_redist.x64.exe"
          
          $SetupScript = @"
          [Setup]
          AppName=KAYPOSFNB
          AppVersion=$VERSION_NUM
          AppPublisher=BabyCodes
          AppPublisherURL=https://github.com/babycodes/KAYPOSFNB-APP
          DefaultDirName={autopf}\KAYPOSFNB
          DefaultGroupName=KAYPOSFNB
          OutputDir=.
          OutputBaseFilename=KAYPOSFNB-$VERSION
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible
          PrivilegesRequired=lowest
          SetupIconFile=windows\runner\resources\app_icon.ico
          UninstallDisplayIcon={app}\kayposfnb.exe
          WizardStyle=modern

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "Create a desktop shortcut"; GroupDescription: "Additional icons:"; Flags: unchecked

          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          Source: "vc_redist.x64.exe"; DestDir: "{tmp}"; Flags: deleteafterinstall

          [Icons]
          Name: "{group}\KAYPOSFNB"; Filename: "{app}\kayposfnb.exe"
          Name: "{group}\Uninstall KAYPOSFNB"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\KAYPOSFNB"; Filename: "{app}\kayposfnb.exe"; Tasks: desktopicon

          [Run]
          Filename: "{tmp}\vc_redist.x64.exe"; Parameters: "/install /quiet /norestart"; StatusMsg: "Installing Visual C++ Runtime..."; Flags: waituntilterminated skipifsilent
          Filename: "{app}\kayposfnb.exe"; Description: "Launch KAYPOSFNB"; Flags: nowait postinstall skipifsilent

          [UninstallDelete]
          Type: filesandordirs; Name: "{app}"
          "@
          Set-Content -Path installer.iss -Value $SetupScript
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" installer.iss

      - name: Release Windows Build
        uses: softprops/action-gh-release@v2.0.1
        with:
          files: frontend/KAYPOSFNB-*.exe
          tag_name: ${{ github.event.inputs.version_tag || github.ref_name }}
          name: KAYPOS FNB ${{ github.event.inputs.version_tag || github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
