name: Build & Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release version tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: 'New release build'

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout private source code
      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: babycodes/KAYPOSFNB
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      # 2. Setup Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      # 4. Decode Keystore from Base64 secret
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > frontend/android/app/upload-keystore.jks

      # 5. Create key.properties from secrets
      - name: Create key.properties
        run: |
          cat > frontend/android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      # 6. Install dependencies
      - name: Flutter pub get
        working-directory: frontend
        run: flutter pub get

      # 7. Build release APK
      - name: Build APK
        working-directory: frontend
        run: flutter build apk --release

      # 8. Rename APK with version
      - name: Rename APK
        run: |
          mv frontend/build/app/outputs/flutter-apk/app-release.apk \
             frontend/build/app/outputs/flutter-apk/KAYPOSFNB-${{ github.event.inputs.version_tag }}.apk

      # 9. Create GitHub Release on this public repo
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: KAYPOS FNB ${{ github.event.inputs.version_tag }}
          body: ${{ github.event.inputs.release_notes }}
          files: frontend/build/app/outputs/flutter-apk/KAYPOSFNB-${{ github.event.inputs.version_tag }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
